<!DOCTYPE html>
<html>
<head>
    <base target="_top">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #7451eb 0%, #6842F5 100%); 
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: #333;
            overflow: hidden; 
        }

        .login-container {
            position: relative;
            z-index: 1; 
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            padding: 20px;
        }

        .login-card {
            background-color: rgba(255, 255, 255, 0.9); 
            backdrop-filter: blur(10px); 
            border-radius: 20px; 
            box-shadow: 
                0 10px 30px rgba(0, 0, 0, 0.2), 
                0 0 0 1px rgba(255, 255, 255, 0.6) inset, 
                0 0 0 2px rgba(0, 0, 0, 0.05) inset; 
            width: 100%;
            max-width: 450px; 
            padding: 40px;
            text-align: center;
            animation: fadeIn 0.8s ease-out; 
        }

        .logo {
            margin-bottom: 25px;
        }

        .logo i {
            font-size: 60px; 
            color: #6842F5;
            margin-bottom: 10px;
        }

        .logo h1 {
            font-size: 28px;
            color: #333;
            margin: 0;
            font-weight: 700;
        }

        .login-card h2 {
            font-size: 24px;
            color: #444;
            margin-top: 0;
            margin-bottom: 30px;
            font-weight: 600;
        }

        .form-group {
            margin-bottom: 25px;
            text-align: left;
            position: relative;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #555;
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 16px;
            color: #333;
            background-color: #fcfcfc;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        .form-group input:focus {
            border-color: #6842F5;
            outline: none;
            box-shadow: 0 0 0 3px rgba(104, 66, 245, 0.2);
        }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            color: white;
            background-color: #6842F5;
            font-size: 18px;
            font-weight: 600;
            transition: background-color 0.3s ease, transform 0.2s ease;
            box-shadow: 0 5px 15px rgba(104, 66, 245, 0.4);
            letter-spacing: 0.5px;
        }

        .btn:hover {
            background-color: #5A39E0; 
            transform: translateY(-2px); 
            box-shadow: 0 7px 20px rgba(104, 66, 245, 0.5);
        }

        .btn:active {
            transform: translateY(0);
            box-shadow: 0 3px 10px rgba(104, 66, 245, 0.3);
        }

        /* Background animation */
        .circles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 0;
        }

        .circles li {
            position: absolute;
            display: block;
            list-style: none;
            width: 20px;
            height: 20px;
            background: rgba(255, 255, 255, 0.1);
            animation: animate 25s linear infinite;
            bottom: -150px;
        }

        .circles li:nth-child(1) { left: 25%; width: 80px; height: 80px; animation-delay: 0s; }
        .circles li:nth-child(2) { left: 10%; width: 20px; height: 20px; animation-delay: 2s; animation-duration: 12s; }
        .circles li:nth-child(3) { left: 70%; width: 20px; height: 20px; animation-delay: 4s; }
        .circles li:nth-child(4) { left: 40%; width: 60px; height: 60px; animation-delay: 0s; animation-duration: 18s; }
        .circles li:nth-child(5) { left: 65%; width: 20px; height: 20px; animation-delay: 0s; }
        .circles li:nth-child(6) { left: 75%; width: 110px; height: 110px; animation-delay: 3s; }
        .circles li:nth-child(7) { left: 35%; width: 150px; height: 150px; animation-delay: 7s; }
        .circles li:nth-child(8) { left: 50%; width: 25px; height: 25px; animation-delay: 15s; animation-duration: 45s; }
        .circles li:nth-child(9) { left: 20%; width: 15px; height: 15px; animation-delay: 2s; animation-duration: 35s; }
        .circles li:nth-child(10) { left: 85%; width: 150px; height: 150px; animation-delay: 0s; animation-duration: 11s; }

        @keyframes animate {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; border-radius: 0; }
            100% { transform: translateY(-1000px) rotate(720deg); opacity: 0; border-radius: 50%; }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="circles">
        <li></li><li></li><li></li><li></li><li></li><li></li><li></li><li></li><li></li><li></li>
    </div>
    
    <div class="login-container">
        <div class="login-card">
            <div class="logo">
                <i class="fas fa-calendar-check"></i> <h1>Izin dan Cuti Karyawan - BAL</h1>
            </div>
            <h2>Selamat Datang Kembali</h2>
            <form id="login-form">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="Masukkan email Anda" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Masukkan password Anda" required>
                </div>
                <button type="submit" class="btn">Login</button>
            </form>
        </div>
    </div>

    <script>
        // Cek apakah ada session yang masih valid saat halaman dimuat
        document.addEventListener('DOMContentLoaded', function() {
            cekSessionLogin();
        });

        // FUNGSI: Cek dan validasi session login
        function cekSessionLogin() {
            const sessionToken = localStorage.getItem('sessionToken');
            const loginTimestamp = localStorage.getItem('loginTimestamp');
            const userRole = localStorage.getItem('userRole');
            
            if (sessionToken && loginTimestamp && userRole) {
                // Cek apakah session masih valid (30 menit = 1800000 ms)
                const currentTime = new Date().getTime();
                const sessionDuration = 30 * 60 * 1000; // 30 menit
                const elapsedTime = currentTime - parseInt(loginTimestamp);
                
                if (elapsedTime < sessionDuration) {
                    // Session masih valid, langsung ke dashboard
                    console.log('Session masih valid, loading dashboard...');
                    Swal.fire({ title: 'Memuat Dashboard...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
                    
                    google.script.run.withSuccessHandler(htmlContent => {
                        document.open();
                        document.write(htmlContent);
                        document.close();
                    }).getPageContent(userRole);
                } else {
                    // Session sudah expired, hapus data dan tampilkan login form
                    localStorage.removeItem('sessionToken');
                    localStorage.removeItem('loginTimestamp');
                    localStorage.removeItem('userRole');
                    sessionStorage.removeItem('sessionToken');
                    console.log('Session expired');
                }
            }
        }

        // Handle form submit
        document.getElementById('login-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            Swal.fire({ title: 'Mencoba Login...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });

            google.script.run.withSuccessHandler(hasil => {
                if (hasil.sukses) {
                    // Simpan token ke localStorage dengan timestamp
                    const loginTime = new Date().getTime();
                    localStorage.setItem('sessionToken', hasil.token);
                    localStorage.setItem('loginTimestamp', loginTime.toString());
                    localStorage.setItem('userRole', hasil.peran);
                    
                    // Juga simpan ke sessionStorage untuk backward compatibility
                    sessionStorage.setItem('sessionToken', hasil.token);
                    
                    google.script.run.withSuccessHandler(htmlContent => {
                        document.open();
                        document.write(htmlContent);
                        document.close();
                    }).getPageContent(hasil.peran);

                } else {
                    Swal.fire('Gagal Login', hasil.pesan, 'error');
                }
            }).loginManual(email, password);
        });
    </script>
</body>
</html>
